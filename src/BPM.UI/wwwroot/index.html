<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM — Browser Page Monitor</title>
    <link rel="icon" type="image/png" sizes="128x128" href="favicon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="header">
        <div class="header-left">
            <span class="logo">BPM</span>
            <span class="meta">User: <strong id="username">—</strong></span>
            <span class="meta">Org: <strong id="organization">—</strong></span>
            <span class="meta">Last refresh: <span id="lastRefresh">—</span></span>
        </div>
        <div class="header-right">
            <span class="rate-limit">
                API: <strong id="rateLimitRemaining">—</strong> / <span id="rateLimitTotal">—</span>
                <span id="rateLimitReset"></span>
            </span>
            <span class="rate-dot" id="rateDot"></span>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab active" data-tab="reviews">📋 Review Requests <span class="badge"
                id="reviewBadge">0</span></button>
        <button class="tab" data-tab="prs">🔀 Open Pull Requests <span class="badge" id="prBadge">0</span></button>
        <button class="tab" data-tab="actions">⚡ GitHub Actions <span class="badge" id="actionBadge">0</span></button>
    </nav>

    <main>
        <section id="reviews" class="tab-content active">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Repo</th>
                            <th>#</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Created</th>
                            <th>Link</th>
                        </tr>
                    </thead>
                    <tbody id="reviewsBody"></tbody>
                </table>
            </div>
        </section>

        <section id="prs" class="tab-content">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Repo</th>
                            <th>#</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Status</th>
                            <th>Updated</th>
                            <th>Link</th>
                        </tr>
                    </thead>
                    <tbody id="prsBody"></tbody>
                </table>
            </div>
            <div id="prDetail" class="detail-panel hidden">
                <h4 id="prDetailHeader"></h4>
                <div id="prComments"></div>
            </div>
        </section>

        <section id="actions" class="tab-content">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Repo</th>
                            <th>Workflow</th>
                            <th>#</th>
                            <th>Actor</th>
                            <th>Status</th>
                            <th>Conclusion</th>
                            <th>Branch</th>
                            <th>Triggered</th>
                            <th>Link</th>
                        </tr>
                    </thead>
                    <tbody id="actionsBody"></tbody>
                </table>
            </div>
            <div id="actionDetail" class="detail-panel hidden">
                <h4 id="actionDetailHeader"></h4>
                <div id="actionAnnotations"></div>
            </div>
        </section>
    </main>

    <footer>
        <span>BPM Web Dashboard — Data served from desktop app</span>
    </footer>

    <script src="app.js"></script>
</body>

</html>
